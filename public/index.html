<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PAID ASSASSIN REPORT BOT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    body {
      background: linear-gradient(-45deg, #0a0a0a, #1a0000, #000000, #1a0000);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      height: 100vh;
    }
    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .glass {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .log-row {
      transition: all 0.2s ease;
    }
    .log-row:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    .banned {
      animation: bannedPulse 1.5s infinite;
    }
    @keyframes bannedPulse {
      0%, 100% { color: #ef4444; }
      50% { color: #f87171; }
    }
  </style>
</head>
<body class="text-white min-h-screen">

  <div class="max-w-5xl mx-auto p-6 relative z-10">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen">
      <div class="glass rounded-3xl p-10 w-full max-w-md">
        <div class="text-center mb-8">
          <div class="text-6xl mb-4">🔥</div>
          <h1 class="text-3xl font-bold text-red-500">PAID ASSASSIN</h1>
          <p class="text-zinc-400 mt-2">Report Bot • Secure Login</p>
        </div>

        <div class="space-y-6">
          <div>
            <label class="block text-sm text-zinc-400 mb-2">USER ID</label>
            <input id="user-id-input" type="text" 
                   class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-red-500"
                   placeholder="Enter your User ID" autocomplete="off">
          </div>

          <button onclick="login()" 
                  class="w-full bg-red-600 hover:bg-red-700 py-5 rounded-2xl font-bold text-xl transition transform hover:scale-105">
            LOGIN
          </button>

          <p class="text-center text-zinc-500 text-sm">
            Contact @levitism for User ID
          </p>
        </div>
      </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden">

      <!-- Header -->
      <div class="flex justify-between items-center mb-8 border-b border-zinc-800 pb-4">
        <div>
          <h1 class="text-3xl font-bold text-red-500">🔥 PAID ASSASSIN REPORT BOT</h1>
          <p class="text-zinc-400 text-sm">by @levitism • Powered by Instagram Bloks API</p>
        </div>
        
        <div class="flex items-center gap-4">
          <div id="user-info" class="text-sm text-zinc-400 font-mono"></div>
          <button onclick="logout()" 
                  class="bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded-2xl text-sm flex items-center gap-2">
            <i class="fas fa-sign-out-alt"></i> LOGOUT
          </button>
        </div>
      </div>

      <!-- ADMIN NAV -->
      <div id="admin-nav" class="hidden mb-6 bg-zinc-900 border border-red-500/30 rounded-2xl p-4">
        <button onclick="showAdminPanel()" 
                class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl text-sm font-medium flex items-center gap-2">
          👑 MANAGE USERS
        </button>
      </div>

      <!-- Reporting Section -->
      <div id="reporting-section">

        <!-- Start Screen -->
        <div id="start-screen" class="text-center py-10">
          <img src="https://i.ibb.co/GfHVC0fY/photo-5472196357457123200-x.jpg" 
               class="mx-auto rounded-2xl mb-8 w-64 shadow-2xl border border-red-500/20" 
               alt="Assassin Logo"/>
          
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 max-w-3xl mx-auto">
            <button onclick="startReport()" 
                    class="bg-red-600 hover:bg-red-700 p-6 rounded-3xl text-xl font-bold transition transform hover:scale-105 flex flex-col items-center gap-3">
              <span class="text-4xl">🚀</span>
              <span>START REPORTING</span>
            </button>

            <button onclick="startMonitoring()" 
                    class="bg-gradient-to-br from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 p-6 rounded-3xl text-xl font-bold transition transform hover:scale-105 flex flex-col items-center gap-3">
              <span class="text-4xl">👁️</span>
              <span>MONITOR USERNAME</span>
            </button>

            <button onclick="openBanningMethods()" 
                    class="bg-gradient-to-br from-purple-600 to-violet-600 hover:from-purple-700 hover:to-violet-700 p-6 rounded-3xl text-xl font-bold transition transform hover:scale-105 flex flex-col items-center gap-3">
              <span class="text-4xl">🔨</span>
              <span>BANNING METHODS</span>
            </button>
          </div>
        </div>

        <!-- Report Flow -->
        <div id="report-flow" class="hidden">
          <div id="username-step">
            <div class="flex items-center gap-3 mb-6">
              <button onclick="goBackToStart()" class="text-zinc-400 hover:text-white">
                <i class="fas fa-arrow-left text-xl"></i>
              </button>
              <h3 class="text-2xl font-semibold">👤 Enter Target Username</h3>
            </div>
            <div class="flex gap-3">
              <input id="username" type="text" placeholder="example123" 
                     class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-red-500"/>
              <button onclick="checkUsername()" 
                      class="bg-white text-black px-8 rounded-2xl font-bold hover:bg-zinc-200 transition">
                CHECK
              </button>
            </div>
            <div id="check-result" class="mt-4 min-h-[60px]"></div>
          </div>

          <div id="report-type-step" class="hidden mt-8">
            <div class="flex items-center gap-3 mb-6">
              <button onclick="goBackToUsername()" class="text-zinc-400 hover:text-white">
                <i class="fas fa-arrow-left text-xl"></i>
              </button>
              <h3 class="text-2xl font-semibold">🔽 Select Report Type</h3>
            </div>
            <div class="grid grid-cols-2 gap-3" id="report-buttons"></div>
          </div>

          <div id="live-reporting" class="hidden mt-8">
            <div class="glass rounded-3xl p-6 border border-red-500/30">
              <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                  <button onclick="goBackToReportType()" class="text-zinc-400 hover:text-white">
                    <i class="fas fa-arrow-left"></i>
                  </button>
                  <div>
                    <span class="text-red-500">🎯 Target:</span> 
                    <span id="live-target" class="font-mono font-bold"></span>
                  </div>
                </div>
                <div class="flex items-center gap-2">
                  <div class="text-green-500 flex items-center gap-1">
                    <span class="relative flex h-3 w-3">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    LIVE
                  </div>
                  <div id="report-count" class="bg-zinc-900 px-4 py-1 rounded-xl text-sm font-mono">0 reports</div>
                </div>
              </div>
              
              <div id="live-table" class="bg-black rounded-2xl p-5 min-h-[360px] overflow-auto font-mono text-sm max-h-[420px]"></div>
              
              <div class="flex gap-3 mt-6">
                <button onclick="stopReporting()" class="flex-1 bg-red-600 hover:bg-red-700 py-5 rounded-2xl font-bold text-lg transition">
                  🛑 STOP REPORTING
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Monitor Section -->
        <div id="monitor-section" class="hidden">
          <div class="glass rounded-3xl p-8 max-w-2xl mx-auto">
            <div class="flex items-center gap-3 mb-6">
              <button onclick="goBackToStartFromMonitor()" class="text-zinc-400 hover:text-white">
                <i class="fas fa-arrow-left text-xl"></i>
              </button>
              <h3 class="text-2xl font-semibold">👁️ Username Monitor</h3>
            </div>

            <div class="flex gap-3 mb-6">
              <input id="monitor-username" type="text" placeholder="Enter username to monitor" 
                     class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-cyan-500"/>
              <button onclick="startMonitorCheck()" 
                      class="bg-cyan-600 hover:bg-cyan-700 px-10 rounded-2xl font-bold transition">
                START MONITOR
              </button>
            </div>

            <div id="monitor-result" class="min-h-[400px] bg-black rounded-2xl p-6 font-mono text-sm overflow-auto"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
      <div class="glass rounded-3xl p-8 w-full max-w-3xl max-h-[90vh] overflow-auto">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-3xl font-bold text-red-500">👑 Admin Panel</h2>
          <button onclick="hideAdminPanel()" class="text-3xl text-zinc-400 hover:text-white">×</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <!-- Add User -->
          <div>
            <h3 class="text-xl font-semibold mb-4">Add New User</h3>
            <div class="flex gap-3">
              <input id="new-user-id" type="text" placeholder="USERID123" 
                     class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-red-500"/>
              <button onclick="addNewUser()" 
                      class="bg-green-600 hover:bg-green-700 px-8 rounded-2xl font-bold">
                ADD
              </button>
            </div>
          </div>

          <!-- User List -->
          <div>
            <h3 class="text-xl font-semibold mb-4 flex items-center gap-2">
              Registered Users 
              <span id="user-count" class="bg-zinc-800 text-xs px-3 py-1 rounded-full"></span>
            </h3>
            <div id="user-list" class="bg-black rounded-2xl p-4 max-h-96 overflow-auto space-y-2 text-sm"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ====================== CONFIG ======================
    const ADMIN_ID = "7968968395"; // ← CHANGE THIS TO YOUR SECRET ADMIN ID

    let allowedUsers = JSON.parse(localStorage.getItem('assassin_allowed_users')) || [
      ADMIN_ID,
    ];

    let currentUserId = null;
    let targetUsername = "";
    let reportName = "";
    let count = 0;
    let interval = null;
    let monitorInterval = null;

    const reports = ["Spam", "Self Harm", "Sale of drugs", "Nudity", "Violence", "Hate", "Harassment", "Impersonation", "Copyright", "Underage", "Sale of firearms", "False information", "Fraud", "Violent threat"];

    // ====================== AUTH ======================
    function login() {
      let inputId = document.getElementById('user-id-input').value.trim().toUpperCase();
      if (!inputId) return alert("Please enter User ID");

      if (!allowedUsers.includes(inputId)) {
        return alert("❌ Invalid or Expired User ID!\nContact @levitism");
      }

      currentUserId = inputId;
      localStorage.setItem('currentUser', currentUserId);

      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('main-app').classList.remove('hidden');
      document.getElementById('user-info').innerHTML = `● ${currentUserId}`;

      if (currentUserId === ADMIN_ID) {
        document.getElementById('admin-nav').classList.remove('hidden');
      }
    }

    function logout() {
      if (confirm("Are you sure you want to logout?")) {
        localStorage.removeItem('currentUser');
        location.reload();
      }
    }

    // ====================== ADMIN PANEL ======================
    function showAdminPanel() {
      if (currentUserId !== ADMIN_ID) return;
      document.getElementById('admin-panel').classList.remove('hidden');
      renderUserList();
    }

    function hideAdminPanel() {
      document.getElementById('admin-panel').classList.add('hidden');
    }

    function addNewUser() {
      if (currentUserId !== ADMIN_ID) return;
      const newId = document.getElementById('new-user-id').value.trim().toUpperCase();
      if (!newId) return alert("Enter a User ID");
      if (allowedUsers.includes(newId)) return alert("User already exists!");

      allowedUsers.push(newId);
      localStorage.setItem('assassin_allowed_users', JSON.stringify(allowedUsers));
      document.getElementById('new-user-id').value = '';
      renderUserList();
      alert(`✅ User ${newId} added successfully!`);
    }

    function removeUser(userId) {
      if (currentUserId !== ADMIN_ID) return;
      if (userId === ADMIN_ID) return alert("Cannot remove Admin!");

      if (confirm(`Remove user ${userId}?`)) {
        allowedUsers = allowedUsers.filter(id => id !== userId);
        localStorage.setItem('assassin_allowed_users', JSON.stringify(allowedUsers));
        renderUserList();
      }
    }

    function renderUserList() {
      const container = document.getElementById('user-list');
      container.innerHTML = '';
      document.getElementById('user-count').textContent = `${allowedUsers.length} total`;

      allowedUsers.forEach(id => {
        const div = document.createElement('div');
        div.className = "flex justify-between items-center bg-zinc-900 p-3 rounded-xl";
        div.innerHTML = `
          <span class="font-mono ${id === ADMIN_ID ? 'text-red-400' : 'text-white'}">${id}</span>
          <div class="flex items-center gap-3">
            <span class="text-xs px-3 py-1 rounded-full ${id === ADMIN_ID ? 'bg-red-500/20 text-red-400' : 'bg-zinc-700 text-zinc-400'}">
              ${id === ADMIN_ID ? 'ADMIN' : 'USER'}
            </span>
            ${id !== ADMIN_ID ? `
              <button onclick="removeUser('${id}')" 
                      class="text-red-500 hover:text-red-600 text-sm font-medium flex items-center gap-1">
                <i class="fas fa-trash"></i> Remove
              </button>` : ''}
          </div>
        `;
        container.appendChild(div);
      });
    }

    // ====================== REPORTING & MONITORING ======================
    function goBackToStart() {
      document.getElementById('report-flow').classList.add('hidden');
      document.getElementById('start-screen').classList.remove('hidden');
    }

    function goBackToStartFromMonitor() {
      if (monitorInterval) clearInterval(monitorInterval);
      document.getElementById('monitor-section').classList.add('hidden');
      document.getElementById('start-screen').classList.remove('hidden');
    }

    function goBackToUsername() {
      document.getElementById('report-type-step').classList.add('hidden');
      document.getElementById('username-step').classList.remove('hidden');
    }

    function goBackToReportType() {
      stopReporting();
      document.getElementById('live-reporting').classList.add('hidden');
      document.getElementById('report-type-step').classList.remove('hidden');
    }

    function startReport() {
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('report-flow').classList.remove('hidden');
      document.getElementById('username-step').classList.remove('hidden');
    }

    function startMonitoring() {
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('monitor-section').classList.remove('hidden');
      document.getElementById('monitor-result').innerHTML = '';
    }

    function openBanningMethods() {
      window.open('https://t.me/levitism', '_blank');
    }

    async function startMonitorCheck() {
      let username = document.getElementById('monitor-username').value.trim().replace('@','').toLowerCase();
      if (!username) return;

      const resultDiv = document.getElementById('monitor-result');
      resultDiv.innerHTML = `<p class="text-yellow-500">🔍 Checking @${username}...</p>`;

      try {
        const resp = await fetch('/check-username', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username})
        });
        const data = await resp.json();

        if (data.exists) {
          resultDiv.innerHTML = `<p class="text-green-400 text-xl mb-4">✅ @${username} is ACTIVE - Monitoring...</p>`;
          startLiveMonitor(username);
        } else {
          resultDiv.innerHTML = `<div class="text-center py-20 banned"><h2 class="text-5xl font-bold text-red-500 mb-4">🚫 USERNAME BANNED / NOT FOUND</h2><p class="text-red-400">@${username}</p></div>`;
        }
      } catch(e) {
        resultDiv.innerHTML = `<p class="text-red-500">❌ Server Error</p>`;
      }
    }

    function startLiveMonitor(username) {
      let monitorCount = 0;
      const resultDiv = document.getElementById('monitor-result');
      if (monitorInterval) clearInterval(monitorInterval);

      monitorInterval = setInterval(() => {
        monitorCount++;
        const log = document.createElement('div');
        log.className = "log-row flex justify-between py-3 border-b border-zinc-800 last:border-none";
        log.innerHTML = `
          <span class="text-cyan-400">#${monitorCount}</span>
          <span class="text-zinc-400">${new Date().toLocaleTimeString()}</span>
          <span class="text-green-500 font-bold">ACTIVE</span>
          <span class="text-white">@${username}</span>
        `;
        resultDiv.appendChild(log);
        resultDiv.scrollTop = resultDiv.scrollHeight;
      }, 2500);
    }

    async function checkUsername() {
      let username = document.getElementById('username').value.trim().replace('@','').toLowerCase();
      if (!username) return;

      const resDiv = document.getElementById('check-result');
      resDiv.innerHTML = `<p class="text-yellow-500">🔍 Checking @${username}...</p>`;

      try {
        const resp = await fetch('/check-username', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username})
        });
        const data = await resp.json();

        if (data.exists) {
          resDiv.innerHTML = `✅ <b class="text-green-400">@${username}</b> exists and is valid!`;
          targetUsername = username;
          document.getElementById('username-step').classList.add('hidden');
          showReportTypes();
        } else {
          resDiv.innerHTML = `❌ @${username} does NOT exist or is invalid.`;
        }
      } catch(e) {
        resDiv.innerHTML = `❌ Server Error. Please try again.`;
      }
    }

    function showReportTypes() {
      const container = document.getElementById('report-buttons');
      container.innerHTML = '';
      reports.forEach((reason, i) => {
        const btn = document.createElement('button');
        btn.className = "bg-zinc-800 hover:bg-zinc-700 p-5 rounded-2xl text-left transition-all hover:border-red-500 border border-zinc-700 group";
        btn.innerHTML = `
          <span class="text-red-500 mr-2 group-hover:text-red-400">${i+1}.</span> 
          <span class="group-hover:text-white">${reason}</span>
        `;
        btn.onclick = () => startMassReport(reason);
        container.appendChild(btn);
      });
      document.getElementById('report-type-step').classList.remove('hidden');
    }

    function startMassReport(reason) {
      reportName = reason;
      document.getElementById('report-type-step').classList.add('hidden');
      document.getElementById('live-reporting').classList.remove('hidden');
      document.getElementById('live-target').textContent = `@${targetUsername}`;

      count = 0;
      const table = document.getElementById('live-table');
      table.innerHTML = `
        <div class="text-green-500 text-center py-8 font-medium">
          ✅ Mass Report Session Started<br>
          <span class="text-xs text-zinc-500">Target: @${targetUsername} • Reason: ${reportName}</span>
        </div>
      `;

      interval = setInterval(() => {
        count++;
        const row = document.createElement('div');
        row.className = "log-row flex justify-between py-3 px-2 border-b border-zinc-800 last:border-none items-center";
        row.innerHTML = `
          <span class="text-cyan-400 w-12">#${count}</span>
          <span class="text-zinc-400 text-xs w-28">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}</span>
          <span class="text-green-500 font-bold">REPORT SENT</span>
          <span class="text-red-400 text-sm">${reportName}</span>
        `;
        table.appendChild(row);
        table.scrollTop = table.scrollHeight;
        document.getElementById('report-count').textContent = `${count} reports`;
      }, 480);
    }

    function stopReporting() {
      if (interval) clearInterval(interval);
      const table = document.getElementById('live-table');
      table.innerHTML += `
        <div class="text-red-500 text-center py-8 font-bold text-xl border-t border-zinc-800 pt-6 mt-4">
          🛑 REPORTING STOPPED<br>
          <span class="text-2xl">Total Reports: ${count}</span>
        </div>
      `;
    }

    // Keyboard Support
    document.addEventListener('keydown', function(e) {
      if (e.key === "Enter") {
        if (!document.getElementById('login-screen').classList.contains('hidden')) {
          login();
        } else if (!document.getElementById('username-step').classList.contains('hidden')) {
          checkUsername();
        } else if (!document.getElementById('monitor-section').classList.contains('hidden')) {
          startMonitorCheck();
        }
      }
    });

    // Auto-login
    window.onload = () => {
      const savedUser = localStorage.getItem('currentUser');
      if (savedUser && allowedUsers.includes(savedUser)) {
        currentUserId = savedUser;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('user-info').innerHTML = `● ${currentUserId}`;

        if (currentUserId === ADMIN_ID) {
          document.getElementById('admin-nav').classList.remove('hidden');
        }
      }
    };
  </script>
</body>
</html>
